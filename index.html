<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorting Practice</title>
<style>
  body { font-family: Arial; text-align: center; }
  #array { display: flex; justify-content: center; margin: 20px; }
  .box {
    width: 40px; height: 40px; margin: 5px;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid black; cursor: grab;
  }
  .dragging { opacity: 0.5; }
  .correct { background-color: lightgreen; }
  #steps { margin-top: 20px; font-size: 14px; }
</style>
</head>
<body>

<h2>Sorting Practice Tool</h2>

<select id="algo" onchange="updateSteps()">
  <option>Binary Search</option>
  <option>Selection Sort</option>
  <option>Insertion Sort</option>
  <option>Merge Sort</option>
</select>
<button onclick="generate()">Start</button>

<p id="instruction"></p>

<div id="array"></div>

<div id="steps"></div>

<script>
let arr = [];

function generate() {
  let algo = document.getElementById("algo").value;
  let container = document.getElementById("array");
  container.innerHTML = "";
  arr = [];

  if (algo === "Binary Search") {
    for (let i = 1; i <= 15; i++) arr.push(i);
    let target = Math.floor(Math.random() * 15) + 1;
    document.getElementById("instruction").innerText = "Find: " + target;
  } else {
    while (arr.length < 8) {
      let num = Math.floor(Math.random() * 8) + 1;
      if (!arr.includes(num)) arr.push(num);
    }
    document.getElementById("instruction").innerText = "Drag to sort";
  }

  render();
}

function render() {
  let container = document.getElementById("array");
  container.innerHTML = "";

  arr.forEach((num, i) => {
    let div = document.createElement("div");
    div.className = "box";
    div.innerText = num;
    div.draggable = true;

    div.addEventListener("dragstart", e => {
      div.classList.add("dragging");
      e.dataTransfer.setData("index", i);
    });

    div.addEventListener("dragend", () => {
      div.classList.remove("dragging");
    });

    div.addEventListener("dragover", e => e.preventDefault());

    div.addEventListener("drop", e => {
      let from = e.dataTransfer.getData("index");
      let to = i;
      [arr[from], arr[to]] = [arr[to], arr[from]];
      render();
    });

    container.appendChild(div);
  });

  checkCorrect();
}

function checkCorrect() {
  let boxes = document.querySelectorAll(".box");
  let sorted = [...arr].sort((a,b)=>a-b);

  boxes.forEach((b, i) => {
    if (arr[i] === sorted[i]) b.classList.add("correct");
    else b.classList.remove("correct");
  });
}

function updateSteps() {
  let algo = document.getElementById("algo").value;
  let steps = document.getElementById("steps");

  if (algo === "Selection Sort") {
    steps.innerText = "Selection Sort Steps: Find smallest number, swap with first. Move right and repeat.";
  } else if (algo === "Insertion Sort") {
    steps.innerText = "Insertion Sort Steps: Take next number, move it left until it is in correct position.";
  } else if (algo === "Merge Sort") {
    steps.innerText = "Merge Sort Steps: Split array in half, sort each half, then merge them together in order.";
  } else {
    steps.innerText = "Binary Search Steps: Check middle, go left or right depending on target.";
  }
}
</script>

</body>
</html>
