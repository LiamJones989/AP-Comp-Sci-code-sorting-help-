<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorting Practice</title>
<style>
  body { font-family: Arial; text-align: center; }
  #array { display: flex; justify-content: center; margin: 20px; }
  .box {
    width: 45px; height: 45px; margin: 5px;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid black; font-weight: bold;
  }
  .draggable { cursor: grab; }
  .dragging { opacity: 0.5; }
  .correct { background-color: lightgreen; }
  #steps { margin-top: 20px; font-size: 14px; max-width: 500px; margin-left:auto; margin-right:auto; }
</style>
</head>
<body>

<h2>Sorting Practice Tool</h2>

<select id="algo" onchange="updateSteps()">
  <option>Binary Search</option>
  <option>Selection Sort</option>
  <option>Insertion Sort</option>
  <option>Merge Sort</option>
</select>
<button onclick="generate()">Start</button>

<p id="instruction"></p>

<div id="array"></div>

<div id="steps"></div>

<script>
let arr = [];
let target = null;
let low = 0;
let high = 0;

function generate() {
  let algo = document.getElementById("algo").value;
  arr = [];

  if (algo === "Binary Search") {
    for (let i = 1; i <= 15; i++) arr.push(i);
    target = Math.floor(Math.random() * 15) + 1;
    low = 0;
    high = arr.length - 1;
    document.getElementById("instruction").innerText = "Click to search for: " + target;
  } else {
    while (arr.length < 8) {
      let num = Math.floor(Math.random() * 8) + 1;
      if (!arr.includes(num)) arr.push(num);
    }
    document.getElementById("instruction").innerText = "Drag numbers to sort";
  }

  render();
}

function render() {
  let container = document.getElementById("array");
  container.innerHTML = "";
  let algo = document.getElementById("algo").value;

  arr.forEach((num, i) => {
    let div = document.createElement("div");
    div.className = "box";
    div.innerText = num;

    if (algo === "Binary Search") {
      div.onclick = () => binaryStep(i);
    } else {
      div.classList.add("draggable");
      div.draggable = true;

      div.addEventListener("dragstart", e => {
        div.classList.add("dragging");
        e.dataTransfer.setData("index", i);
      });

      div.addEventListener("dragend", () => div.classList.remove("dragging"));
      div.addEventListener("dragover", e => e.preventDefault());

      div.addEventListener("drop", e => {
        let from = parseInt(e.dataTransfer.getData("index"));
        let to = i;
        if (from === to) return;
        [arr[from], arr[to]] = [arr[to], arr[from]];
        render();
      });
    }

    container.appendChild(div);
  });

  if (algo !== "Binary Search") checkCorrect();
}

function binaryStep(index) {
  let mid = Math.floor((low + high) / 2);

  if (index !== mid) {
    document.getElementById("instruction").innerText = "Wrong step! Click the middle index.";
    return;
  }

  if (arr[mid] === target) {
    document.getElementById("instruction").innerText = "Found " + target + " correctly!";
  } else if (arr[mid] < target) {
    low = mid + 1;
    document.getElementById("instruction").innerText = "Go right";
  } else {
    high = mid - 1;
    document.getElementById("instruction").innerText = "Go left";
  }
}

function checkCorrect() {
  let boxes = document.querySelectorAll(".box");
  let sorted = [...arr].sort((a,b)=>a-b);

  boxes.forEach((b, i) => {
    if (arr[i] === sorted[i]) b.classList.add("correct");
    else b.classList.remove("correct");
  });
}

function updateSteps() {
  let algo = document.getElementById("algo").value;
  let steps = document.getElementById("steps");

  if (algo === "Selection Sort") {
    steps.innerText = "Selection Sort:\n1. Find smallest number\n2. Swap with first unsorted\n3. Move forward\n4. Repeat";
  } else if (algo === "Insertion Sort") {
    steps.innerText = "Insertion Sort:\n1. Take next number\n2. Compare left\n3. Shift bigger numbers right\n4. Insert in correct spot";
  } else if (algo === "Merge Sort") {
    steps.innerText = "Merge Sort:\n1. Split array in half\n2. Keep splitting\n3. Merge sorted halves\n4. Repeat until sorted";
  } else {
    steps.innerText = "Binary Search:\n1. Check middle\n2. If smaller go left\n3. If bigger go right\n4. Repeat";
  }
}

updateSteps();
</script>

</body>
</html>
