<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorting Practice</title>
<style>
  body { font-family: Arial; text-align: center; }
  #array { display: flex; justify-content: center; margin: 20px; }
  .box {
    width: 40px; height: 40px; margin: 5px;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid black; cursor: pointer;
  }
  .selected { background-color: yellow; }
  .correct { background-color: lightgreen; }
</style>
</head>
<body>

<h2>Sorting Practice Tool</h2>

<select id="algo">
  <option>Binary Search</option>
  <option>Selection Sort</option>
  <option>Insertion Sort</option>
  <option>Merge Sort</option>
</select>
<button onclick="generate()">Start</button>

<p id="instruction"></p>

<div id="array"></div>

<script>
let arr = [];
let selected = null;
let algo = "";
let currentIndex = 0;

function generate() {
  algo = document.getElementById("algo").value;
  let container = document.getElementById("array");
  container.innerHTML = "";
  arr = [];
  currentIndex = 0;

  if (algo === "Binary Search") {
    for (let i = 1; i <= 15; i++) arr.push(i);
    let target = Math.floor(Math.random() * 15) + 1;
    document.getElementById("instruction").innerText = "Find: " + target;
  } else {
    while (arr.length < 8) {
      let num = Math.floor(Math.random() * 8) + 1;
      if (!arr.includes(num)) arr.push(num);
    }
    document.getElementById("instruction").innerText = algo + " step " + (currentIndex+1);
  }

  render();

  if (algo === "Merge Sort") mergeSortVisual([...arr], 0);
}

function render() {
  let container = document.getElementById("array");
  container.innerHTML = "";

  arr.forEach((num, i) => {
    let div = document.createElement("div");
    div.className = "box";
    div.innerText = num;
    div.onclick = () => clickBox(i);
    container.appendChild(div);
  });

  checkCorrect();
}

function clickBox(index) {
  if (algo === "Selection Sort") selectionStep(index);
  else if (algo === "Insertion Sort") insertionStep(index);
}

function selectionStep(index) {
  if (selected === null) {
    if (index !== currentIndex) return;
    selected = index;
    highlight(index);
  } else {
    let minIndex = currentIndex;
    for (let i = currentIndex; i < arr.length; i++) {
      if (arr[i] < arr[minIndex]) minIndex = i;
    }

    if (index === minIndex) {
      [arr[currentIndex], arr[minIndex]] = [arr[minIndex], arr[currentIndex]];
      currentIndex++;
      selected = null;
      render();
      document.getElementById("instruction").innerText = "Selection Sort step " + (currentIndex+1);
    }
  }
}

function insertionStep(index) {
  if (index === currentIndex && currentIndex > 0) {
    if (arr[index] < arr[index-1]) {
      [arr[index], arr[index-1]] = [arr[index-1], arr[index]];
      currentIndex--;
    } else {
      currentIndex++;
    }
    render();
    document.getElementById("instruction").innerText = "Insertion Sort step " + (currentIndex+1);
  } else if (currentIndex === 0) {
    currentIndex = 1;
  }
}

function mergeSortVisual(array, start) {
  if (array.length <= 1) return;

  let mid = Math.floor(array.length / 2);
  let left = array.slice(0, mid);
  let right = array.slice(mid);

  setTimeout(() => {
    mergeSortVisual(left, start);
    mergeSortVisual(right, start + mid);

    let merged = [];
    while (left.length && right.length) {
      merged.push(left[0] < right[0] ? left.shift() : right.shift());
    }

    merged = [...merged, ...left, ...right];

    for (let i = 0; i < merged.length; i++) {
      arr[start + i] = merged[i];
    }

    render();
  }, 800);
}

function highlight(i) {
  document.querySelectorAll('.box')[i].classList.add('selected');
}

function checkCorrect() {
  let boxes = document.querySelectorAll(".box");
  let sorted = [...arr].sort((a,b)=>a-b);

  boxes.forEach((b, i) => {
    if (arr[i] === sorted[i]) b.classList.add("correct");
    else b.classList.remove("correct");
  });
}
</script>

</body>
</html>
